name: Update AI Infra Radar History

on:
  workflow_dispatch:
  schedule:
    - cron: '35 6 * * *'

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure records directory
        run: mkdir -p records

      - name: Validate and detect anomalies
        run: |
          node <<'EOF'
          const fs = require('fs');
          const inbox = JSON.parse(fs.readFileSync('records/inbox.json','utf8'));
          const rules = JSON.parse(fs.readFileSync('records/validation-rules.json','utf8')).rules;

          let warnings = [];

          rules.required_top_fields.forEach(f => {
            if (!(f in inbox)) warnings.push(`Missing field: ${f}`);
          });

          Object.values(inbox.axes).forEach(a => {
            if (a.value < rules.axis_min || a.value > rules.axis_max) {
              warnings.push(`Axis out of range: ${a.label}`);
            }
          });

          if (inbox.totalPulse < rules.pulse_min || inbox.totalPulse > rules.pulse_max) {
            warnings.push('totalPulse out of range');
          }

          const sum = inbox.allocation.reduce((s,x)=>s+x.pct,0);
          if (sum !== rules.allocation_sum_expected) {
            warnings.push(`Allocation sum != 100 (got ${sum})`);
          }

          if (warnings.length > 0) {
            console.log('⚠️ Anomaly warnings:');
            warnings.forEach(w => console.log('-', w));
          } else {
            console.log('✅ No anomalies detected');
          }
          EOF

      - name: Archive inbox to latest and dated record with duplicate guard
        run: |
          node <<'EOF'
          const fs = require('fs');
          const today = new Date().toISOString().slice(0,10);
          const inboxPath = 'records/inbox.json';
          const latestPath = 'records/latest.json';
          const datedPath = `records/${today}.json`;
          const indexPath = 'records/index.json';
          const statePath = 'records/ingest-state.json';

          const inbox = JSON.parse(fs.readFileSync(inboxPath, 'utf8'));
          const payloadHash = JSON.stringify(inbox);

          let state = { last_ingested_date: null, last_ingested_hash: null };
          if (fs.existsSync(statePath)) {
            state = JSON.parse(fs.readFileSync(statePath, 'utf8'));
          }

          let index = { latest: today, records: [] };
          if (fs.existsSync(indexPath)) {
            index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
          }

          const alreadyInIndex = index.records.some(r => r.date === today);
          const alreadySamePayload = state.last_ingested_date === today && state.last_ingested_hash === payloadHash;

          if (alreadyInIndex && alreadySamePayload && fs.existsSync(datedPath)) {
            console.log(`No-op: ${today} already ingested with same payload.`);
            process.exit(0);
          }

          inbox.date = today;
          fs.writeFileSync(latestPath, JSON.stringify(inbox, null, 2));
          fs.writeFileSync(datedPath, JSON.stringify(inbox, null, 2));

          const summary = {
            date: today,
            signal: {
              headline: inbox.signal?.headline || 'AI Infra radar update'
            }
          };

          const existing = index.records.find(r => r.date === today);
          if (existing) {
            existing.signal = summary.signal;
          } else {
            index.records.unshift(summary);
          }

          index.records = index.records.sort((a, b) => b.date.localeCompare(a.date));
          index.latest = today;
          fs.writeFileSync(indexPath, JSON.stringify(index, null, 2));

          state.last_ingested_date = today;
          state.last_ingested_hash = payloadHash;
          fs.writeFileSync(statePath, JSON.stringify(state, null, 2));
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add records/
          git diff --cached --quiet || git commit -m "Archive radar history for $(date -u +%F)"
          git push
