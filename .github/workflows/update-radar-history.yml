name: Update AI Infra Radar History

on:
  workflow_dispatch:
  schedule:
    - cron: '35 6 * * *'

permissions:
  contents: write

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure records directory
        run: mkdir -p records

      - name: Archive inbox to latest and dated record
        run: |
          node <<'EOF'
          const fs = require('fs');
          const today = new Date().toISOString().slice(0,10);
          const inboxPath = 'records/inbox.json';
          const latestPath = 'records/latest.json';
          const datedPath = `records/${today}.json`;
          const indexPath = 'records/index.json';

          if (!fs.existsSync(inboxPath)) {
            throw new Error('records/inbox.json not found');
          }

          const inbox = JSON.parse(fs.readFileSync(inboxPath, 'utf8'));
          inbox.date = today;

          fs.writeFileSync(latestPath, JSON.stringify(inbox, null, 2));
          fs.writeFileSync(datedPath, JSON.stringify(inbox, null, 2));

          let index = { latest: today, records: [] };
          if (fs.existsSync(indexPath)) {
            index = JSON.parse(fs.readFileSync(indexPath, 'utf8'));
          }

          const summary = {
            date: today,
            signal: {
              headline: inbox.signal?.headline || 'AI Infra radar update'
            }
          };

          const existing = index.records.find(r => r.date === today);
          if (existing) {
            existing.signal = summary.signal;
          } else {
            index.records.unshift(summary);
          }

          index.latest = today;
          fs.writeFileSync(indexPath, JSON.stringify(index, null, 2));
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add records/
          git diff --cached --quiet || git commit -m "Archive radar history for $(date -u +%F)"
          git push
