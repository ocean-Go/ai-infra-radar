<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Infra 投资雷达图</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e17; --surface: #111827; --surface2: #1a2235;
      --border: #1e2d45; --accent: #3b82f6; --accent2: #06b6d4;
      --green: #22c55e; --yellow: #eab308; --red: #ef4444;
      --text: #e2e8f0; --muted: #64748b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }

    /* HEADER */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .radar-icon { width: 32px; height: 32px; opacity: 0.9; }
    .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .header-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 4px; }
    .badge.green { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .badge.cyan  { background: rgba(6,182,212,0.12); color: var(--accent2); border: 1px solid rgba(6,182,212,0.25); }
    .timestamp { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

    /* GRID */
    .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    @media(max-width:900px){ .main-grid { grid-template-columns: 1fr; } }
    .right-panel { display: flex; flex-direction: column; gap: 16px; }

    /* CARD */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

    /* RADAR */
    .radar-section { display: flex; flex-direction: column; }
    .radar-wrap { display: flex; justify-content: center; align-items: center; flex: 1; }
    .radar-svg { width: 100%; max-width: 480px; height: auto; }

    /* PULSE */
    .pulse-bar-wrap { margin-top: 16px; }
    .pulse-bar-labels { display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--muted); margin-bottom: 4px; }
    .pulse-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .pulse-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--green), var(--accent2)); transition: width 1s ease; }

    /* SIGNAL */
    .signal-box { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; border-radius: 8px; background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.2); }
    .signal-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 12px rgba(34,197,94,0.5); flex-shrink: 0; margin-top: 4px; }
    .signal-text { font-size: 13px; font-weight: 500; line-height: 1.4; }
    .signal-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* SCORES */
    .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .score-item { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
    .score-value { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1; }
    .score-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .score-item.green .score-value { color: var(--green); }
    .score-item.cyan  .score-value { color: var(--accent2); }
    .score-item.yellow .score-value { color: var(--yellow); }
    .score-item.blue  .score-value { color: var(--accent); }

    /* TICKER TABLE */
    .ticker-table { width: 100%; border-collapse: collapse; }
    .ticker-table th { font-size: 10px; font-weight: 600; color: var(--muted); text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); letter-spacing: 0.05em; }
    .ticker-table th:last-child, .ticker-table td:last-child { text-align: right; }
    .ticker-table td { font-size: 12px; padding: 8px 8px; border-bottom: 1px solid rgba(30,45,69,0.6); vertical-align: middle; }
    .ticker-table tr:last-child td { border-bottom: none; }
    .ticker-name { font-weight: 600; }
    .ticker-sym { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
    .alloc-bar { height: 4px; background: var(--surface); border-radius: 2px; margin-top: 3px; overflow: hidden; }
    .alloc-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .tag { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
    .tag.core   { background: rgba(59,130,246,0.15); color: var(--accent); }
    .tag.growth { background: rgba(34,197,94,0.15); color: var(--green); }
    .tag.opt    { background: rgba(234,179,8,0.15); color: var(--yellow); }

    /* TRIGGERS */
    .trigger-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(30,45,69,0.6); }
    .trigger-item:last-child { border-bottom: none; }
    .trigger-icon { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
    .trigger-icon.power { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .trigger-icon.cool { background: rgba(6,182,212,0.15); color: var(--accent2); }
    .trigger-icon.scale { background: rgba(34,197,94,0.15); color: var(--green); }
    .trigger-text { font-size: 12px; line-height: 1.5; }
    .trigger-meaning { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* ACTION */
    .action-box { background: var(--surface2); border-radius: 8px; padding: 14px; }
    .action-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .action-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .action-arrow { font-size: 12px; color: var(--accent); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .action-text { font-size: 12px; }
    .action-reason { font-size: 11px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.5; }

    /* BOTTOM */
    .bottom-section { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    @media(max-width:900px){ .bottom-section { grid-template-columns: 1fr; } }

    .status-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
    .status-pill { text-align: center; padding: 6px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
    .status-pill.green  { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .status-pill.yellow { background: rgba(234,179,8,0.1); color: var(--yellow); border: 1px solid rgba(234,179,8,0.2); }
    .status-pill.red    { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .verdict-list { list-style: none; padding: 0; }
    .verdict-list li { font-size: 12px; padding: 6px 0; border-bottom: 1px solid rgba(30,45,69,0.5); display: flex; align-items: flex-start; gap: 8px; line-height: 1.4; }
    .verdict-list li:last-child { border-bottom: none; }
    .verdict-bullet { color: var(--accent2); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

    .summary-box { background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(6,182,212,0.05)); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px; padding: 14px; }
    .summary-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .summary-text { font-size: 13px; font-weight: 500; line-height: 1.6; }
    .summary-text em { color: var(--accent2); font-style: normal; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container" id="app"></div>

  <script src="data.js"></script>
  <script>
    // ─── RADAR GEOMETRY ───
    const CX = 250, CY = 250, RMAX = 190;
    // Axes: 0=top, 1=60°, 2=120°, 3=180°(down), 4=240°, 5=300°
    const AXIS_ANGLES = [-90, -30, 30, 90, 150, 210]; // degrees from top, clockwise

    function radarPoint(value, axisIndex) {
      const rad = AXIS_ANGLES[axisIndex] * Math.PI / 180;
      return {
        x: CX + (value / 100) * RMAX * Math.cos(rad),
        y: CY - (value / 100) * RMAX * Math.sin(rad)
      };
    }

    function scoreColor(v) {
      return v >= 80 ? '#22c55e' : v >= 60 ? '#06b6d4' : v >= 40 ? '#eab308' : '#ef4444';
    }

    // ─── BUILD RADAR ───
    function buildRadarSVG() {
      const axes = RADAR_DATA.axes;
      const values = [axes.capex.value, axes.power.value, axes.cooling.value, axes.scale.value, axes.visibility.value, axes.pricing.value];
      const labels = [axes.capex.label, axes.power.label, axes.cooling.label, axes.scale.label, axes.visibility.label, axes.pricing.label];
      const sublabels = [axes.capex.sublabel, axes.power.sublabel, axes.cooling.sublabel, axes.scale.sublabel, axes.visibility.sublabel, axes.pricing.sublabel];

      // Build polygon points
      const pts = values.map((v, i) => {
        const p = radarPoint(v, i);
        return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
      }).join(' ');

      // Grid rings at 25, 50, 75, 100%
      const rings = [25, 50, 75, 100].map(pct => {
        const pts = AXIS_ANGLES.map((ang, i) => {
          const rad = ang * Math.PI / 180;
          return `${(CX + (pct/100)*RMAX*Math.cos(rad)).toFixed(1)},${(CY - (pct/100)*RMAX*Math.sin(rad)).toFixed(1)}`;
        }).join(' ');
        return `<polygon points="${pts}" fill="none" stroke="rgba(59,130,246,${0.12 - pct*0.001})" stroke-width="1"/>`;
      }).join('\n');

      // Axis lines
      const axisLines = AXIS_ANGLES.map(ang => {
        const rad = ang * Math.PI / 180;
        const ex = (CX + RMAX * Math.cos(rad)).toFixed(1);
        const ey = (CY - RMAX * Math.sin(rad)).toFixed(1);
        return `<line x1="${CX}" y1="${CY}" x2="${ex}" y2="${ey}" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>`;
      }).join('\n');

      // Axis label positions
      const labelPos = AXIS_ANGLES.map((ang, i) => {
        const rad = ang * Math.PI / 180;
        const dist = RMAX + 18;
        return {
          x: (CX + dist * Math.cos(rad)).toFixed(1),
          y: (CY - dist * Math.sin(rad)).toFixed(1),
          anchor: Math.abs(ang) === 90 ? 'middle' : ang > 0 ? 'start' : 'end',
          subAnchor: Math.abs(ang) === 90 ? 'middle' : ang > 0 ? 'start' : 'end'
        };
      });

      // Score dots
      const dots = values.map((v, i) => {
        const p = radarPoint(v, i);
        return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4" fill="${scoreColor(v)}" filter="url(#glow)"/>`;
      }).join('\n');

      // Label text elements
      const axisLabels = values.map((v, i) => {
        const lp = labelPos[i];
        return `
          <text x="${lp.x}" y="${(parseFloat(lp.y) - 6).toFixed(1)}" text-anchor="${lp.anchor}" class="axis-label">${labels[i]}</text>
          <text x="${lp.x}" y="${parseFloat(lp.y).toFixed(1)}" text-anchor="${lp.subAnchor}" class="axis-sublabel">${sublabels[i]}</text>
        `;
      }).join('\n');

      return `
        <svg class="radar-svg" viewBox="0 0 500 440" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.35"/>
              <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.15"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          ${rings}
          ${axisLines}
          <polygon points="${pts}" fill="url(#radarGrad)" stroke="#22c55e" stroke-width="1.5" filter="url(#glow)"/>
          ${dots}
          ${axisLabels}
          <circle cx="22" cy="20" r="4" fill="#22c55e"/>
          <text x="32" y="24" font-size="9" fill="#64748b" font-family="JetBrains Mono,monospace">高(80-100)</text>
          <circle cx="92" cy="20" r="4" fill="#06b6d4"/>
          <text x="102" y="24" font-size="9" fill="#64748b" font-family="JetBrains Mono,monospace">中高(60-79)</text>
          <circle cx="162" cy="20" r="4" fill="#eab308"/>
          <text x="172" y="24" font-size="9" fill="#64748b" font-family="JetBrains Mono,monospace">中低(40-59)</text>
          <circle cx="232" cy="20" r="4" fill="#ef4444"/>
          <text x="242" y="24" font-size="9" fill="#64748b" font-family="JetBrains Mono,monospace">受限(0-39)</text>
        </svg>`;
    }

    // ─── RENDER ───
    function render() {
      const d = RADAR_DATA;
      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())} UTC+2`;

      // Allocation rows
      const allocRows = d.allocation.map(a => `
        <tr>
          <td>${a.tag ? `<span class="tag ${a.tag}">${a.sub}</span>` : ''}</td>
          <td>
            <div style="font-size:12px;font-weight:600;">${a.label}</div>
            <div class="alloc-bar"><div class="alloc-fill" style="width:${a.pct}%;background:${a.color};"></div></div>
          </td>
          <td><span class="ticker-pct" style="color:${a.color};">${a.pct}%</span></td>
        </tr>`).join('');

      // Trigger items
      const triggers = d.triggers.map(t => `
        <div class="trigger-item">
          <div class="trigger-icon ${t.iconClass}">${t.icon}</div>
          <div>
            <div class="trigger-text">${t.text}</div>
            <div class="trigger-meaning">${t.meaning}</div>
          </div>
        </div>`).join('');

      // Action rows
      const actionRows = d.action.moves.map(m => `
        <div class="action-row">
          <span class="action-arrow">${m.delta}</span>
          <span class="action-text">${m.text}</span>
        </div>`).join('');

      // Verdict list
      const verdicts = d.verdicts.map(v => `<li><span class="verdict-bullet">▸</span>${v}</li>`).join('');

      // Status pills
      const statusHTML = [d.marketStatus.demand, d.marketStatus.supply, d.marketStatus.power].map(s =>
        `<div class="status-pill ${s.color}">${s.label} ${s.color === 'green' ? '🟢' : s.color === 'yellow' ? '🟡' : '🔴'}</div>`
      ).join('');

      // Company rows
      const companyRows = d.companies.map(c => `
        <tr>
          <td>
            <div class="ticker-name">${c.name}</div>
            <div class="ticker-sym">${c.ticker}</div>
          </td>
          <td><span class="tag ${c.tag}">${c.tag === 'core' ? 'Core' : c.tag === 'growth' ? 'Growth' : 'Opt'}</span></td>
          <td style="font-size:11px;color:#94a3b8;">${c.insight}</td>
        </tr>`).join('');

      document.getElementById('app').innerHTML = `
        <!-- HEADER -->
        <div class="header">
          <div class="header-left">
            <svg class="radar-icon" viewBox="0 0 32 32" fill="none">
              <circle cx="16" cy="16" r="14" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3"/>
              <circle cx="16" cy="16" r="10" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
              <circle cx="16" cy="16" r="6" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.7"/>
              <circle cx="16" cy="16" r="2" fill="#3b82f6"/>
              <line x1="16" y1="16" x2="22" y2="10" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M 16 2 A 14 14 0 0 1 28 10" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.8" stroke-linecap="round" fill="none"/>
            </svg>
            <h1>📡 AI Infra 投资雷达图</h1>
          </div>
          <div class="header-meta">
            <span class="badge green">${d.signal.status}</span>
            <span class="badge cyan">${d.signal.phase}</span>
            <span class="timestamp">${ts}</span>
          </div>
        </div>

        <!-- MAIN GRID -->
        <div class="main-grid">

          <!-- LEFT -->
          <div style="display:flex;flex-direction:column;gap:16px;">

            <!-- RADAR -->
            <div class="card radar-section">
              <div class="card-title">六维能力雷达 · 赛道健康度</div>
              <div class="radar-wrap">${buildRadarSVG()}</div>
              <div class="pulse-bar-wrap">
                <div class="pulse-bar-labels">
                  <span>赛道总动能</span>
                  <span>${d.totalPulse} / 100</span>
                </div>
                <div class="pulse-bar">
                  <div class="pulse-fill" style="width:${d.totalPulse}%"></div>
                </div>
              </div>
            </div>

            <!-- COMPANIES -->
            <div class="card">
              <div class="card-title">公司状态快照</div>
              <table class="ticker-table">
                <thead><tr><th>公司</th><th>定位</th><th>核心看点</th></tr></thead>
                <tbody>${companyRows}</tbody>
              </table>
            </div>

          </div>

          <!-- RIGHT -->
          <div class="right-panel">

            <!-- SIGNAL -->
            <div class="card">
              <div class="card-title">市场信号</div>
              <div class="signal-box">
                <div class="signal-dot"></div>
                <div>
                  <div class="signal-text">${d.signal.headline}</div>
                  <div class="signal-sub">${d.signal.sub}</div>
                </div>
              </div>
            </div>

            <!-- SCORES -->
            <div class="card">
              <div class="card-title">关键指标</div>
              <div class="score-grid">
                ${d.scores.map(s => `
                  <div class="score-item ${s.color}">
                    <div class="score-value">${s.value}</div>
                    <div class="score-label">${s.label}</div>
                  </div>`).join('')}
              </div>
            </div>

            <!-- ALLOCATION -->
            <div class="card">
              <div class="card-title">当前建议仓位</div>
              <table class="ticker-table" style="margin-top:4px;">
                <thead><tr><th>层级</th><th>标的</th><th style="text-align:right">权重</th></tr></thead>
                <tbody>${allocRows}</tbody>
              </table>
            </div>

            <!-- TRIGGERS -->
            <div class="card">
              <div class="card-title">⚡ 关键触发</div>
              ${triggers}
            </div>

            <!-- ACTION -->
            <div class="card">
              <div class="card-title">📊 今日操作</div>
              <div class="action-box">
                <div class="action-title">再平衡动作</div>
                ${actionRows}
                <div class="action-reason">${d.action.reason}</div>
              </div>
            </div>

          </div>
        </div>

        <!-- BOTTOM -->
        <div class="bottom-section">

          <!-- STATUS -->
          <div class="card">
            <div class="card-title">🚦 市场状态</div>
            <div class="status-grid">${statusHTML}</div>
            <div style="font-size:12px;color:#94a3b8;line-height:1.6;margin-top:8px;">
              行业不是"降温"<br/>而是"被电力卡住节奏"
            </div>
          </div>

          <!-- VERDICTS -->
          <div class="card">
            <div class="card-title">🧩 核心判断</div>
            <ul class="verdict-list">${verdicts}</ul>
          </div>

          <!-- SUMMARY -->
          <div class="card">
            <div class="card-title">🧠 一句话</div>
            <div class="summary-box" style="margin-top:0;">
              <div class="summary-text">${d.summary}</div>
            </div>
          </div>

        </div>
      `;
    }

    render();
  </script>
</body>
</html>
