<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Infra 投资雷达图</title>
<style>
body{background:#0a0e17;color:#e2e8f0;font-family:Arial;padding:20px}
.card{background:#111827;border:1px solid #1e2d45;border-radius:10px;padding:20px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">Loading...</div>
<script>
async function init(){
 try{
  const res=await fetch('records/index.json?t='+Date.now());
  const data=await res.json();
  const latest=data.records[0];
  document.getElementById('app').innerHTML=`
    <div class="card">
      <h2>📡 AI Infra 投资雷达图</h2>
      <p>${latest.signal.headline}</p>
      <p style="color:#94a3b8">当前为安全模式（完整仪表盘恢复中）</p>
    </div>
    <div class="card">
      <h3>历史记录</h3>
      ${data.records.map(r=>`<div>${r.date} - ${r.signal.headline}</div>`).join('')}
    </div>
  `;
 }catch(e){
  document.getElementById('app').innerHTML='加载失败：'+e.message;
 }
}
init();
</script>
</body>
</html>
